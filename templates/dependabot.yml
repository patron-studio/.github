# Dependabot configuration.
#
# Dependabot does NOT inherit from the org `.github` repo — every repo needs
# its own `.github/dependabot.yml`. This file is the Patron Studio default;
# copy-paste it into a new repo and adjust the directories / package-ecosystem
# entries to match the repo's package manager and layout.
#
# Tuned to be low-noise: monthly cadence, everything bundled into ONE grouped
# PR per ecosystem (so at most ~2 PRs a month), majors held back for manual
# review, and rebasing disabled so open PRs don't re-trigger CI / Slack
# notifications on every push to the base branch.
#
# See:
#   https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm / pnpm / yarn dependencies. Most Patron Studio repos use pnpm but
  # the `package-ecosystem: npm` value covers all three.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: monthly
      day: monday
      time: '07:00'
      timezone: 'Europe/London'
    open-pull-requests-limit: 5
    rebase-strategy: disabled
    labels:
      - dependencies
    groups:
      # Every non-major npm update across the workspace lands in ONE PR.
      npm:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps need manual review; humans handle them.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # GitHub Actions versions — all bumps bundled into a single PR.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
      day: monday
      time: '07:00'
      timezone: 'Europe/London'
    open-pull-requests-limit: 5
    rebase-strategy: disabled
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - '*'
