name: Sentry Triage Poll

# Org-level Sentry → auto-fix triage. Pulls unresolved production error issues
# across every Sentry project, keeps only genuine scoped code defects (strict
# gate + LLM classifier), and files a Linear ticket assigned to sam for each.
# Each product repo's claude-bot poll turns sam/Todo tickets into fix PRs, so
# Linear is the only seam — this workflow never writes to any repo.
#
# Approve a candidate by moving its Linear ticket to "Todo" (bot dispatches
# within ~10 min). Set AUTO_DISPATCH=true to send high-confidence defects
# straight to Todo with no human gate.
#
# NOTE: `schedule:` runs only from the DEFAULT branch (main) — dormant on a PR
# branch until merged. Use the manual run (with dry_run) to test from a branch.

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Classify and log candidates without creating Linear tickets"
        type: boolean
        default: false

permissions:
  contents: read # talks only to Sentry/Linear/OpenAI/Slack — no repo writes

concurrency:
  group: sentry-triage-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Poll Sentry and file triage tickets
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: patron-studio
          LINEAR_API_KEY: ${{ secrets.SAM_LINEAR_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AUTO_DISPATCH: ${{ vars.SENTRY_TRIAGE_AUTO_DISPATCH || 'false' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node scripts/sentry-triage-poll.mjs

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "🔴 *Sentry triage poll failed* — production issues may not be getting triaged.\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
